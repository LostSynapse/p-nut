esphome:
  name: p-nut-waveshare
  friendly_name: P-NUT Waveshare
  platformio_options:
    build_flags:
      - -DESPHOME_DEBUG

esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  hardware_uart: UART0

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: IP101
  mdc_pin: GPIO31
  mdio_pin: GPIO52
  clk:
    mode: CLK_EXT_IN
    pin: GPIO50
  power_pin: GPIO51
  phy_addr: 1

external_components:
  - source: github://lostsynapse/esphome-components
    components: [ups_hid, nut_server]

ups_hid:
  id: ups_monitor
  protocol: auto
  update_interval: 30s

nut_server:
  ups_hid_id: ups_monitor
  port: 3493
  username: nutuser
  password: nutpass

sensor:
  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Battery Level"
    id: battery_level
    type: battery_level
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Input Voltage"
    id: input_voltage
    type: input_voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Output Voltage"
    id: output_voltage
    type: output_voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Load Percentage"
    id: load_percentage
    type: load_percent
    unit_of_measurement: "%"
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 0

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Runtime Remaining"
    id: runtime_remaining
    type: runtime
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0

  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

binary_sensor:
  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Battery Charging"
    id: battery_charging
    type: charging
    device_class: battery

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "Overload Warning"
    id: overload_warning
    type: overload
    device_class: power

text_sensor:
  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "UPS Manufacturer"
    id: ups_manufacturer
    type: manufacturer

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "UPS Model"
    id: ups_model
    type: model

  - platform: version
    name: "ESPHome Version"
    id: esphome_version

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "UPS Test Result"
    id: ups_test_result
    type: ups_test_result

button:
  - platform: ups_hid
    ups_hid_id: ups_monitor
    beeper_action: enable
    name: "UPS Beeper Enable"
    icon: "mdi:volume-high"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    beeper_action: disable
    name: "UPS Beeper Disable"
    icon: "mdi:volume-off"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    beeper_action: mute
    name: "UPS Beeper Mute"
    icon: "mdi:volume-mute"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    beeper_action: test
    name: "UPS Beeper Test"
    icon: "mdi:bell-ring"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    test_action: battery_quick
    name: "UPS Quick Battery Test"
    icon: "mdi:battery-check"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    test_action: battery_deep
    name: "UPS Deep Battery Test"
    icon: "mdi:battery-plus"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    test_action: battery_stop
    name: "UPS Stop Battery Test"
    icon: "mdi:battery-remove"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    test_action: ups_test
    name: "UPS Panel Test"
    icon: "mdi:test-tube"

  - platform: ups_hid
    ups_hid_id: ups_monitor
    test_action: ups_stop
    name: "UPS Stop Panel Test"
    icon: "mdi:stop"

number:
  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "UPS Shutdown Delay"
    id: ups_shutdown_delay_config
    delay_type: shutdown
    min_value: 0
    max_value: 600
    step: 10
    unit_of_measurement: "s"
    device_class: duration
    entity_category: config
    icon: "mdi:timer-settings"
    mode: box

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "UPS Start Delay"
    id: ups_start_delay_config
    delay_type: start
    min_value: 0
    max_value: 600
    step: 10
    unit_of_measurement: "s"
    device_class: duration
    entity_category: config
    icon: "mdi:timer-settings"
    mode: box

  - platform: ups_hid
    ups_hid_id: ups_monitor
    name: "UPS Reboot Delay"
    id: ups_reboot_delay_config
    delay_type: reboot
    min_value: 0
    max_value: 600
    step: 10
    unit_of_measurement: "s"
    device_class: duration
    entity_category: config
    icon: "mdi:timer-settings"
    mode: box

script:
  - id: read_delay_configuration
    then:
      - logger.log:
          format: "Current delay configuration - Shutdown: %.0fs, Start: %.0fs, Reboot: %.0fs"
          args:
            - "id(ups_shutdown_delay_config).state"
            - "id(ups_start_delay_config).state"
            - "id(ups_reboot_delay_config).state"
          level: INFO

  - id: apply_default_delays
    then:
      - number.set:
          id: ups_shutdown_delay_config
          value: 60.0
      - number.set:
          id: ups_start_delay_config
          value: 120.0
      - number.set:
          id: ups_reboot_delay_config
          value: 60.0
      - logger.log: "Applied default delay configuration"